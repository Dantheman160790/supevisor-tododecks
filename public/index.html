<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Supervisor Vendedor — Todo Decks</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --navy:#0B2545;--teal:#0D7377;--gold:#C9A84C;
  --green:#16A34A;--green-bg:#DCFCE7;
  --red:#DC2626;--red-bg:#FEE2E2;
  --amber:#D97706;--amber-bg:#FEF3C7;
  --blue:#2563EB;--blue-bg:#EFF6FF;
  --border:#E8EDF2;--bg:#F8FAFC;--white:#FFFFFF;
  --text:#0F172A;--muted:#64748B;--light:#F1F5F9;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:13px;line-height:1.5;}
.topbar{background:var(--navy);padding:.75rem 1.5rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.topbar img{height:32px;object-fit:contain;filter:brightness(0) invert(1);}
.topbar-right{display:flex;align-items:center;gap:12px;}
.topbar-title{font-size:13px;font-weight:600;color:rgba(255,255,255,.7);}
.date-badge{background:rgba(255,255,255,.1);color:white;font-size:11px;padding:4px 12px;border-radius:20px;font-family:'DM Mono',monospace;}
.sync-btn{background:var(--gold);color:var(--navy);border:none;border-radius:7px;padding:7px 16px;font-size:11px;font-weight:700;cursor:pointer;}
.sync-btn:hover{opacity:.9;}
.sync-btn:disabled{opacity:.6;cursor:default;}
.slack-btn{background:rgba(255,255,255,.1);color:white;border:1px solid rgba(255,255,255,.2);border-radius:7px;padding:7px 14px;font-size:11px;font-weight:600;cursor:pointer;}
.slack-btn:hover{background:rgba(255,255,255,.18);}

.main{padding:1.25rem 1.5rem;max-width:1400px;margin:0 auto;}

/* KPIs */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:1.25rem;}
.kpi-card{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:1rem 1.1rem;}
.kpi-label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:6px;}
.kpi-value{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;}
.kpi-sub{font-size:10px;color:var(--muted);margin-top:3px;}

/* Actividades */
.act-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:1.25rem;}
.act-col{border-radius:10px;overflow:hidden;border:1px solid var(--border);}
.act-header{padding:.6rem 1rem;display:flex;align-items:center;justify-content:space-between;}
.act-header span{font-size:10px;font-weight:700;color:white;}
.act-badge{background:rgba(255,255,255,.25);color:white;font-size:10px;font-weight:700;padding:2px 9px;border-radius:12px;}
.act-body{padding:.5rem;background:var(--white);max-height:280px;overflow-y:auto;}
.act-card{background:var(--light);border-radius:7px;padding:8px 10px;margin-bottom:5px;border-left:3px solid var(--navy);}
.act-card:last-child{margin-bottom:0;}
.act-tipo{font-size:10px;font-weight:600;color:var(--navy);margin-bottom:2px;}
.act-lead{font-size:10px;color:var(--muted);margin-bottom:1px;}
.act-nota{font-size:9.5px;color:#475569;font-style:italic;}
.act-fecha{font-size:8.5px;color:var(--muted);margin-top:3px;}
.act-empty{text-align:center;padding:1.5rem 1rem;font-size:10px;color:var(--muted);}

/* Reuniones */
.section-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:.6rem;}
.reuniones-grid{display:flex;flex-direction:column;gap:6px;margin-bottom:1.25rem;}
.reunion-card{background:var(--white);border:1px solid var(--border);border-radius:9px;padding:.75rem 1rem;display:flex;align-items:center;gap:12px;}
.reunion-hora{font-family:'DM Mono',monospace;font-size:13px;font-weight:700;color:var(--teal);min-width:50px;}
.reunion-nombre{font-size:11px;font-weight:600;}
.reunion-lugar{font-size:10px;color:var(--muted);}

/* Pipeline */
.pipeline-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:10px;margin-bottom:1.25rem;}
.pipeline-etapa{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:.85rem 1rem;}
.etapa-nombre{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:6px;}
.etapa-count{font-size:22px;font-weight:700;font-family:'DM Mono',monospace;color:var(--teal);}
.etapa-valor{font-size:9.5px;color:var(--muted);margin-top:2px;}
.etapa-items{margin-top:8px;display:flex;flex-direction:column;gap:3px;}
.etapa-item{font-size:8.5px;display:flex;justify-content:space-between;align-items:center;color:#475569;}
.etapa-item-dias{font-family:'DM Mono',monospace;font-size:8px;}

/* Tabla estancadas */
.tw{width:100%;overflow-x:auto;margin-bottom:1.25rem;}
table{width:100%;border-collapse:collapse;font-size:10px;}
thead{background:var(--navy);color:white;}
th{padding:8px 10px;font-weight:600;font-size:9px;text-align:right;letter-spacing:.03em;}
th:first-child{text-align:left;}
td{padding:7px 10px;border-bottom:1px solid var(--border);text-align:right;}
td:first-child{text-align:left;font-weight:600;}
tr:hover td{background:var(--light);}

/* Historial */
.historial-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-bottom:1.25rem;}
.dia-card{background:var(--white);border:1px solid var(--border);border-radius:8px;padding:.6rem .75rem;text-align:center;}
.dia-label{font-size:9px;color:var(--muted);margin-bottom:4px;}
.dia-num{font-size:13px;font-weight:700;font-family:'DM Mono',monospace;color:var(--navy);}
.dia-sub{font-size:8.5px;color:var(--muted);margin-top:2px;}

/* Status bar */
.status-bar{background:var(--white);border-top:1px solid var(--border);padding:.5rem 1.5rem;display:flex;align-items:center;justify-content:space-between;font-size:10px;color:var(--muted);position:fixed;bottom:0;left:0;right:0;}
.status-dot{width:7px;height:7px;border-radius:50%;background:#555;display:inline-block;margin-right:5px;}
.status-dot.ok{background:var(--green);}
.status-dot.error{background:var(--red);}

.pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:600;}
.pill-red{background:var(--red-bg);color:var(--red);}
.pill-amber{background:var(--amber-bg);color:var(--amber);}
.pill-green{background:var(--green-bg);color:var(--green);}

.error-banner{background:var(--red-bg);border:1px solid #FECACA;border-radius:8px;padding:.75rem 1rem;margin-bottom:1rem;font-size:11px;color:var(--red);display:none;}
.loading{text-align:center;padding:3rem;color:var(--muted);font-size:13px;display:none;}

@media(max-width:900px){
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .act-grid{grid-template-columns:1fr;}
  .historial-grid{grid-template-columns:repeat(4,1fr);}
}
</style>
</head>

<script>
const TIPOS = {
  'Email':'📧','Llamada':'📞','Reunión':'🤝','Meeting':'🤝',
  'Call':'📞','Todo':'✅','Recordatorio':'🔔','Subir documento':'📄'
};
function ti(t){ return TIPOS[t]||'📌'; }
function fmt(n){ return '$'+Math.round(n||0).toLocaleString('es-MX'); }
function fmtK(n){ return n>=1000000?'$'+(n/1000000).toFixed(1)+'M':n>=1000?'$'+(n/1000).toFixed(0)+'k':'$'+n; }
function fmtHora(s){ return s?s.split('T')[1]?.slice(0,5)||'—':'—'; }

function setStatus(state, txt){
  const dot=document.getElementById('status-dot');
  dot.className='status-dot '+(state==='ok'?'ok':state==='error'?'error':'');
  document.getElementById('status-txt').textContent=txt;
}

function actCard(a, showDias=false){
  return `<div class="act-card">
    <div class="act-tipo">${ti(a.tipo)} ${a.tipo||'Actividad'} ${showDias?'<span style="color:var(--red);font-size:8px">· '+a.dias_vencida+'d vencida</span>':''}</div>
    <div class="act-lead">🏢 ${a.lead||'—'}</div>
    ${a.resumen?`<div class="act-nota">"${a.resumen}"</div>`:''}<div class="act-fecha">📅 ${a.fecha} · ${a.user||'—'}</div>
  </div>`;
}

async function cargarDatos(){
  const btn=document.getElementById('sync-btn');
  const errEl=document.getElementById('error-banner');
  const loadEl=document.getElementById('loading');
  btn.disabled=true; btn.textContent='⏳';
  errEl.style.display='none'; loadEl.style.display='block';
  setStatus('','Consultando Odoo…');

  try{
    const res=await fetch('/api/datos');
    if(!res.ok)throw new Error('Error '+res.status);
    const d=await res.json();
    if(d.error)throw new Error(d.error);
    render(d);
    setStatus('ok','Conectado · Odoo en vivo');
    document.getElementById('last-sync').textContent='Actualizado: '+new Date().toLocaleTimeString('es-MX',{hour:'2-digit',minute:'2-digit'});
    document.getElementById('fecha-badge').textContent=d.fecha;
  }catch(err){
    setStatus('error','Error: '+err.message);
    errEl.style.display='block';
    errEl.textContent='⚠️ '+err.message;
  }finally{
    loadEl.style.display='none';
    btn.disabled=false; btn.textContent='🔄 Actualizar';
  }
}

function render(d){
  const act=d.actividades||{};
  const pip=d.pipeline||{};
  const kpis=d.kpis||{};

  // KPIs
  const kpiEl=document.getElementById('kpi-grid');
  kpiEl.innerHTML=[
    {icon:'🎯',label:'Ganados este mes',val:kpis.ganados_mes||0,sub:fmt(kpis.valor_ganado_mes||0)+' en ingresos',col:'var(--green)',bg:'var(--green-bg)'},
    {icon:'📈',label:'Tasa de conversión',val:(kpis.tasa_conversion||0)+'%',sub:'Oportunidades → Ganadas',col:'var(--teal)',bg:'var(--white)'},
    {icon:'🆕',label:'Leads esta semana',val:kpis.nuevos_semana||0,sub:'Nuevos contactos',col:'var(--blue)',bg:'var(--blue-bg)'},
    {icon:'💰',label:'Pipeline total',val:fmtK(pip.valor_total||0),sub:(pip.total_oportunidades||0)+' oportunidades abiertas',col:'var(--navy)',bg:'var(--white)'},
  ].map(k=>`<div class="kpi-card" style="background:${k.bg}">
    <div class="kpi-label">${k.icon} ${k.label}</div>
    <div class="kpi-value" style="color:${k.col}">${k.val}</div>
    <div class="kpi-sub">${k.sub}</div>
  </div>`).join('');

  // Reuniones
  const rEl=document.getElementById('reuniones-grid');
  if((d.reuniones||[]).length===0){
    rEl.innerHTML='<div style="color:var(--muted);font-size:11px;padding:.5rem 0">— Sin reuniones programadas para hoy</div>';
  }else{
    rEl.innerHTML=(d.reuniones||[]).map(r=>`<div class="reunion-card">
      <div class="reunion-hora">${fmtHora(r.inicio)}</div>
      <div>
        <div class="reunion-nombre">${r.nombre}</div>
        <div class="reunion-lugar">${r.lugar!=='—'?'📍 '+r.lugar:''}</div>
      </div>
    </div>`).join('');
  }

  // Actividades
  document.getElementById('badge-v').textContent=(act.vencidas||[]).length;
  document.getElementById('badge-h').textContent=(act.hoy||[]).length;
  document.getElementById('badge-p').textContent=(act.proximas||[]).length;

  document.getElementById('act-vencidas').innerHTML=(act.vencidas||[]).length
    ?(act.vencidas||[]).map(a=>actCard(a,true)).join('')
    :'<div class="act-empty">✅ Sin actividades vencidas</div>';
  document.getElementById('act-hoy').innerHTML=(act.hoy||[]).length
    ?(act.hoy||[]).map(a=>actCard(a)).join('')
    :'<div class="act-empty">Sin actividades para hoy</div>';
  document.getElementById('act-prox').innerHTML=(act.proximas||[]).length
    ?(act.proximas||[]).map(a=>actCard(a)).join('')
    :'<div class="act-empty">Sin actividades próximas</div>';

  // Pipeline
  const pipEl=document.getElementById('pipeline-grid');
  const etapas=pip.por_etapa||{};
  pipEl.innerHTML=Object.entries(etapas).map(([e,info])=>`
    <div class="pipeline-etapa">
      <div class="etapa-nombre">${e}</div>
      <div class="etapa-count">${info.count}</div>
      <div class="etapa-valor">${fmtK(Math.round(info.total))} en juego</div>
      <div class="etapa-items">
        ${(info.oportunidades||[]).slice(0,3).map(op=>`<div class="etapa-item">
          <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:110px">${op.name||op.partner_name||'—'}</span>
          <span class="etapa-item-dias" style="color:${op.dias_sin_movimiento>7?'var(--red)':'var(--muted)'}">${op.dias_sin_movimiento}d${op.dias_sin_movimiento>7?' ⚠':''}
          </span>
        </div>`).join('')}
        ${info.count>3?`<div style="font-size:8px;color:var(--muted)">+${info.count-3} más…</div>`:''}</div>
    </div>`).join('');

  // Estancadas
  const tbl=document.getElementById('tbl-estancadas');
  const est=pip.estancadas||[];
  if(est.length===0){
    tbl.innerHTML='<thead><tr><th>✅ No hay oportunidades estancadas — pipeline activo</th></tr></thead>';
  }else{
    tbl.innerHTML='<thead><tr><th>Oportunidad</th><th>Cliente</th><th>Etapa</th><th>Valor</th><th>Días</th><th>Alerta</th></tr></thead>';
    const tb=document.createElement('tbody');
    [...est].sort((a,b)=>b.dias-a.dias).forEach(op=>{
      const urgencia=op.dias>14?'<span class="pill pill-red">🔴 Urgente</span>':'<span class="pill pill-amber">🟡 Atención</span>';
      const tr=document.createElement('tr');
      tr.innerHTML=`<td>${op.nombre||'—'}</td><td style="font-weight:400;color:var(--muted)">${op.cliente||'—'}</td>
        <td style="text-align:center">${op.etapa||'—'}</td>
        <td style="font-family:'DM Mono',monospace">${fmt(op.valor)}</td>
        <td style="font-family:'DM Mono',monospace;color:${op.dias>14?'var(--red)':'var(--amber)'};font-weight:700">${op.dias}d</td>
        <td style="text-align:center">${urgencia}</td>`;
      tb.appendChild(tr);
    });
    tbl.appendChild(tb);
  }
}

async function enviarSlack(tipo){
  const r=await fetch('/api/slack/'+tipo,{method:'POST'});
  const d=await r.json();
  alert(d.ok?'✅ '+d.mensaje:'❌ '+d.error);
}

// Auto-refresh cada 5 minutos
setInterval(cargarDatos, 5*60*1000);
cargarDatos();
</script>
